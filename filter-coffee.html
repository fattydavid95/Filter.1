<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour — Filter Coffee</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #0d0d0d;
  --white: #f5f5f5;
  --mid: #888;
  --faint: #1e1e1e;
  --line: #2a2a2a;
  --line-light: #3d3d3d;

  /* Fluid type — scales from 360px to 1600px viewport */
  --tx-xs:   clamp(0.67rem, 0.56rem + 0.28vw, 0.8rem);
  --tx-sm:   clamp(0.8rem,  0.66rem + 0.38vw, 0.97rem);
  --tx-base: clamp(0.92rem, 0.74rem + 0.46vw, 1.1rem);
  --tx-md:   clamp(1.05rem, 0.84rem + 0.55vw, 1.28rem);
  --tx-lg:   clamp(1.2rem,  0.95rem + 0.7vw,  1.5rem);
  --tx-xl:   clamp(1.4rem,  1.05rem + 0.95vw, 1.85rem);
  --tx-2xl:  clamp(1.7rem,  1.2rem  + 1.35vw, 2.5rem);
  --tx-3xl:  clamp(2.2rem,  1.5rem  + 1.8vw,  3.2rem);

  /* Fluid sidebar */
  --sidebar-w: clamp(220px, 19vw, 320px);
}

html, body {
  height: 100%;
  background: var(--black);
  color: var(--white);
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 300;
  font-size: var(--tx-base);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  padding: 0 clamp(16px, 2vw, 36px);
  height: clamp(46px, 4vw, 62px);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  gap: clamp(12px, 1.5vw, 24px);
}
.wordmark {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-sm);
  font-weight: 500;
  letter-spacing: 0.08em;
  color: var(--white);
  text-transform: uppercase;
}
.wordmark span { color: var(--mid); font-weight: 300; }
.header-nav { display: flex; gap: 0; margin-left: auto; }
.hn-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--mid);
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px clamp(10px, 1.2vw, 20px);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.hn-btn:hover { color: var(--white); }
.hn-btn.active { color: var(--white); border-bottom-color: var(--white); }

/* ── PANELS ── */
.panel { display: none; flex: 1; overflow: hidden; }
.panel.active { display: flex; }

/* ══════════════════════════════════
   RECIPES PANEL
══════════════════════════════════ */
#recipes-panel { flex-direction: row; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  min-width: 200px;
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.sidebar-search {
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.sidebar-search input {
  width: 100%;
  background: var(--faint);
  border: 1px solid var(--line-light);
  color: var(--white);
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  padding: clamp(6px, 0.4vw, 9px) clamp(8px, 0.6vw, 12px);
  outline: none;
  border-radius: 0;
  transition: border-color 0.15s;
}
.sidebar-search input::placeholder { color: var(--mid); }
.sidebar-search input:focus { border-color: var(--white); }

.sidebar-scroll { overflow-y: auto; flex: 1; }
.sidebar-scroll::-webkit-scrollbar { width: 3px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--line-light); }

/* Dripper group */
.dripper-group { }
.dripper-heading {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px 6px;
  position: sticky;
  top: 0;
  background: var(--black);
  z-index: 2;
  cursor: pointer;
  user-select: none;
}
.dripper-heading-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mid);
}
.dripper-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  color: var(--line-light);
  margin-left: auto;
}
.dripper-toggle {
  font-size: 9px;
  color: var(--line-light);
  transition: transform 0.2s;
}
.dripper-group.collapsed .dripper-toggle { transform: rotate(-90deg); }
.dripper-group.collapsed .dripper-items { display: none; }

/* Recipe item */
.recipe-item {
  padding: clamp(9px, 0.7vw, 14px) clamp(12px, 1vw, 18px);
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background 0.1s;
}
.recipe-item:hover { background: var(--faint); }
.recipe-item.active { background: var(--white); }
.recipe-item.active .ri-title { color: var(--black); }
.recipe-item.active .ri-sub { color: #444; }
.recipe-item.active .ri-badge { border-color: #bbb; color: #444; }
.ri-title {
  font-size: var(--tx-sm);
  font-weight: 400;
  color: var(--white);
  line-height: 1.3;
  margin-bottom: 3px;
}
.ri-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  color: var(--mid);
}
.ri-badges { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
.ri-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.05em;
  padding: 2px 6px;
  border: 1px solid var(--line-light);
  color: var(--mid);
  text-transform: uppercase;
}
.ri-badge.user-badge { border-color: var(--mid); color: var(--white); }

/* Detail pane */
.detail-pane {
  flex: 1;
  overflow-y: auto;
  padding: clamp(24px, 2.5vw, 52px) clamp(24px, 3.5vw, 64px);
}
.detail-pane::-webkit-scrollbar { width: 3px; }
.detail-pane::-webkit-scrollbar-thumb { background: var(--line-light); }

.dp-eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 10px;
}
.dp-title {
  font-size: var(--tx-2xl);
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 4px;
}
.dp-author {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-sm);
  color: var(--mid);
  margin-bottom: 32px;
  font-style: italic;
}

/* Stats row */
.stats-row {
  display: flex;
  gap: 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  margin-bottom: 36px;
}
.stat-cell {
  flex: 1;
  padding: clamp(10px, 0.9vw, 20px) clamp(10px, 1.2vw, 24px);
  border-right: 1px solid var(--line);
}
.stat-cell:last-child { border-right: none; }
.stat-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 4px;
}
.stat-value {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xl);
  font-weight: 500;
  color: var(--white);
  line-height: 1;
}
.stat-unit {
  font-size: var(--tx-xs);
  font-weight: 300;
  color: var(--mid);
}

/* Section label */
.section-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mid);
  border-bottom: 1px solid var(--line);
  padding-bottom: 8px;
  margin-bottom: 16px;
}

.dp-notes {
  font-size: var(--tx-base);
  line-height: 1.75;
  color: #aaa;
  margin-bottom: 36px;
  max-width: 580px;
}

/* Pour table */
.pour-table { width: 100%; max-width: 560px; border-collapse: collapse; margin-bottom: 36px; }
.pour-table th {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mid);
  text-align: left;
  padding: 0 0 8px;
  border-bottom: 1px solid var(--line);
  font-weight: 400;
}
.pour-table th:not(:first-child) { text-align: right; }
.pour-table td {
  padding: clamp(8px, 0.65vw, 14px) 0;
  border-bottom: 1px solid var(--line);
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-sm);
  color: var(--white);
  vertical-align: middle;
}
.pour-table td:not(:first-child) { text-align: right; color: var(--mid); }
.td-at { width: 60px; color: var(--white) !important; }
.td-desc { font-family: 'IBM Plex Sans', sans-serif !important; font-size: var(--tx-base) !important; color: var(--white) !important; }
.td-pour { }
.td-total { }

/* Action buttons */
.dp-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-primary {
  background: var(--white);
  color: var(--black);
  border: none;
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: clamp(9px, 0.7vw, 14px) clamp(18px, 1.5vw, 28px);
  cursor: pointer;
  font-weight: 500;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-secondary {
  background: none;
  color: var(--mid);
  border: 1px solid var(--line-light);
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: clamp(9px, 0.7vw, 14px) clamp(14px, 1.2vw, 22px);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.btn-secondary:hover { color: var(--white); border-color: var(--white); }
.btn-danger {
  background: none;
  color: #666;
  border: 1px solid var(--line);
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: clamp(9px, 0.7vw, 14px) clamp(14px, 1.2vw, 22px);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.btn-danger:hover { color: #e05; border-color: #e05; }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  height: 100%;
  padding: 0 48px;
  color: var(--mid);
}
.empty-state p { font-size: var(--tx-base); line-height: 1.7; max-width: 320px; }

/* ══════════════════════════════════
   TIMER PANEL
══════════════════════════════════ */
#timer-panel {
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0;
  overflow-y: auto;
}

.timer-container {
  width: 100%;
  max-width: clamp(340px, 36vw, 540px);
  padding: clamp(28px, 3vw, 52px) clamp(16px, 2vw, 32px) 60px;
  margin: 0 auto;
}

.timer-header { margin-bottom: 36px; }
.timer-recipe-title { font-size: var(--tx-xl); font-weight: 400; margin-bottom: 3px; }
.timer-recipe-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  color: var(--mid);
  letter-spacing: 0.1em;
}

/* Clock */
.clock-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 32px;
  position: relative;
}
.clock-svg { display: block; }
.clock-track { fill: none; stroke: var(--line); stroke-width: 1.5; }
.clock-arc {
  fill: none;
  stroke: var(--white);
  stroke-width: 1.5;
  stroke-linecap: butt;
  transition: stroke-dashoffset 0.9s linear;
}
.clock-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.clock-time-display {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-3xl);
  font-weight: 300;
  letter-spacing: -0.02em;
  line-height: 1;
}
.clock-step-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--mid);
}
.clock-step-action {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-sm);
  color: var(--white);
  margin-top: 2px;
}

/* Step list in timer */
.timer-steps { margin-bottom: 28px; }
.ts-row {
  display: grid;
  grid-template-columns: 44px 1fr 56px 20px;
  align-items: center;
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px solid var(--line);
}
.ts-at {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--mid);
}
.ts-desc { font-size: var(--tx-sm); color: #888; }
.ts-pour {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-sm);
  color: var(--mid);
  text-align: right;
}
.ts-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  border: 1px solid var(--line-light);
  margin-left: auto;
  flex-shrink: 0;
  transition: all 0.2s;
}
.ts-row.done .ts-at, .ts-row.done .ts-desc, .ts-row.done .ts-pour { color: var(--line-light); }
.ts-row.done .ts-dot { background: var(--mid); border-color: var(--mid); }
.ts-row.current .ts-at, .ts-row.current .ts-desc { color: var(--white); }
.ts-row.current .ts-pour { color: var(--white); }
.ts-row.current .ts-dot { background: var(--white); border-color: var(--white); }

/* Timer controls */
.timer-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.tctrl {
  background: none;
  border: 1px solid var(--line-light);
  color: var(--mid);
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  padding: clamp(8px, 0.6vw, 12px) clamp(14px, 1.2vw, 22px);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.05em;
}
.tctrl:hover { color: var(--white); border-color: var(--white); }
.tctrl.tctrl-play {
  background: var(--white);
  border-color: var(--white);
  color: var(--black);
  font-weight: 500;
  padding: clamp(8px, 0.6vw, 12px) clamp(24px, 2vw, 40px);
}
.tctrl.tctrl-play:hover { opacity: 0.85; }

/* Water progress */
.water-progress { margin-top: 8px; }
.water-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}
.water-row span {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  color: var(--mid);
  letter-spacing: 0.08em;
}
.water-bar { height: 2px; background: var(--line); }
.water-fill { height: 100%; background: var(--white); transition: width 0.8s linear; }

/* ══════════════════════════════════
   ADD RECIPE PANEL
══════════════════════════════════ */
#add-panel {
  overflow-y: auto;
  flex-direction: column;
}
#add-panel::-webkit-scrollbar { width: 3px; }
#add-panel::-webkit-scrollbar-thumb { background: var(--line-light); }

.add-form-wrap {
  max-width: 600px;
  padding: clamp(24px, 2.5vw, 52px) clamp(20px, 3.5vw, 56px) 80px;
  width: 100%;
}

.form-title {
  font-size: var(--tx-xl);
  font-weight: 400;
  margin-bottom: 32px;
}
.form-section-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mid);
  border-bottom: 1px solid var(--line);
  padding-bottom: 6px;
  margin-bottom: 16px;
  margin-top: 32px;
}
.form-section-label:first-of-type { margin-top: 0; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-row.single { grid-template-columns: 1fr; }
.form-row.triple { grid-template-columns: 1fr 1fr 1fr; }

.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--mid);
}
.form-input, .form-select, .form-textarea {
  background: var(--faint);
  border: 1px solid var(--line-light);
  color: var(--white);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: var(--tx-base);
  font-weight: 300;
  padding: clamp(7px, 0.5vw, 11px) clamp(9px, 0.7vw, 13px);
  outline: none;
  border-radius: 0;
  -webkit-appearance: none;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--white); }
.form-input::placeholder, .form-textarea::placeholder { color: var(--line-light); }
.form-select option { background: #1a1a1a; }
.form-textarea { resize: vertical; min-height: 80px; }

/* Steps editor */
.steps-editor { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.step-edit-row {
  display: grid;
  grid-template-columns: 64px 1fr 64px 32px;
  gap: 8px;
  align-items: center;
}
.step-edit-row .form-input { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
.step-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--line-light);
  text-align: center;
}
.btn-icon {
  background: none;
  border: 1px solid var(--line);
  color: var(--mid);
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  transition: all 0.15s;
}
.btn-icon:hover { border-color: #e05; color: #e05; }
.btn-add-step {
  background: none;
  border: 1px dashed var(--line-light);
  color: var(--mid);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  padding: 9px;
  width: 100%;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.btn-add-step:hover { border-color: var(--white); color: var(--white); }

.form-hint {
  font-family: 'IBM Plex Mono', monospace;
  font-size: var(--tx-xs);
  color: var(--line-light);
  margin-top: 2px;
}

.form-actions { display: flex; gap: 10px; margin-top: 28px; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--white);
  color: var(--black);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  padding: 10px 20px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 50;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #111;
  border: 1px solid var(--line-light);
  padding: 32px;
  max-width: 380px;
  width: 90%;
}
.modal-title { font-size: var(--tx-md); font-weight: 400; margin-bottom: 10px; }
.modal-body { font-size: var(--tx-base); color: var(--mid); line-height: 1.6; margin-bottom: 24px; }
.modal-actions { display: flex; gap: 10px; }

/* ── MOBILE ── */
@media (max-width: 680px) {
  #recipes-panel { flex-direction: column; }
  .sidebar { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--line); max-height: 240px; }
  .detail-pane { padding: 24px 20px; }
  .dp-title { font-size: var(--tx-xl); }
  .stats-row { flex-wrap: wrap; }
  .stat-cell { min-width: 50%; }
  .add-form-wrap { padding: 24px 20px 60px; }
  .form-row { grid-template-columns: 1fr; }
  .form-row.triple { grid-template-columns: 1fr 1fr; }
  header { padding: 0 16px; }
  .wordmark { font-size: 12px; }
  .hn-btn { padding: 4px 10px; font-size: 10px; }
}

/* ── GRIND GAUGE ── */
.grind-block { margin-bottom: clamp(20px, 1.8vw, 36px); max-width: 640px; }
.grind-info-row {
  display: flex; align-items: baseline; gap: clamp(10px, 1vw, 20px);
  margin-bottom: clamp(10px, 0.9vw, 18px); flex-wrap: wrap;

<div class="app">

  <header>
    <div class="wordmark">Pour <span>/ Filter Coffee</span></div>
    <nav class="header-nav">
      <button class="hn-btn active" onclick="switchTo('recipes')">Recipes</button>
      <button class="hn-btn" onclick="switchTo('timer')">Timer</button>
      <button class="hn-btn" onclick="switchTo('add')">+ Add</button>

  <!-- RECIPES -->
  <div class="panel active" id="recipes-panel">
    <div class="sidebar">
      <div class="sidebar-search">

      </div>
      <div class="sidebar-scroll" id="sidebar-scroll"></div>
    </div>
    <div class="detail-pane" id="detail-pane">
      <div class="empty-state">

      </div>
    </div>
  </div>

  <!-- TIMER -->
  <div class="panel" id="timer-panel">

      </div>
    </div>
  </div>

  <!-- ADD RECIPE -->
  <div class="panel" id="add-panel">
    <div class="add-form-wrap">
      <div class="form-title" id="form-title">Add your recipe</div>

      <div class="form-section-label">Recipe info</div>
      <div class="form-row">
        <div class="form-field">
          <label class="form-label">Recipe name</label>
          <input class="form-input" id="f-name" placeholder="e.g. My Morning V60" type="text">
        </div>
        <div class="form-field">
          <label class="form-label">Dripper</label>
          <select class="form-select" id="f-dripper">
            <option value="V60">V60</option>
            <option value="Chemex">Chemex</option>
            <option value="Kalita Wave">Kalita Wave</option>
            <option value="Origami">Origami</option>
            <option value="Aeropress">Aeropress</option>
            <option value="Clever Dripper">Clever Dripper</option>
            <option value="Melodrip">Melodrip</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="form-label">Author / Barista</label>
          <input class="form-input" id="f-author" placeholder="e.g. James Hoffmann" type="text">
        </div>
        <div class="form-field">
          <label class="form-label">Origin / Competition</label>
          <input class="form-input" id="f-origin" placeholder="e.g. WBrC 2024" type="text">
        </div>
      </div>

      <div class="form-section-label">Brew parameters</div>
      <div class="form-row triple">
        <div class="form-field">
          <label class="form-label">Coffee (g)</label>
          <input class="form-input" id="f-coffee" type="number" min="1" placeholder="15">
        </div>
        <div class="form-field">
          <label class="form-label">Water (g)</label>
          <input class="form-input" id="f-water" type="number" min="1" placeholder="250">
        </div>
        <div class="form-field">
          <label class="form-label">Temp (°C)</label>
          <input class="form-input" id="f-temp" type="number" min="60" max="100" placeholder="93">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="form-label">Grind size</label>
          <select class="form-select" id="f-grind">
            <option value="">Select grind size…</option>
            <option value="Extra Fine">Extra Fine</option>
            <option value="Fine">Fine</option>
            <option value="Medium-fine">Medium-fine</option>
            <option value="Medium">Medium</option>
            <option value="Medium-coarse">Medium-coarse</option>
            <option value="Coarse">Coarse</option>
            <option value="Extra Coarse">Extra Coarse</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">Total brew time</label>
          <input class="form-input" id="f-time" placeholder="e.g. 3:00" type="text">
          <span class="form-hint">Format: m:ss</span>
        </div>
      </div>

      <div class="form-section-label">Notes</div>
      <div class="form-row single">
        <div class="form-field">
          <textarea class="form-textarea" id="f-notes" placeholder="Technique, bean suggestions, tasting notes…"></textarea>
        </div>
      </div>

      <div class="form-section-label">Pour schedule</div>
      <div class="form-row" style="grid-template-columns:64px 1fr 64px 32px; gap:8px; margin-bottom:6px;">
        <span class="form-label" style="padding-left:4px">Time</span>
        <span class="form-label">Description</span>
        <span class="form-label">Pour (g)</span>
        <span></span>
      </div>
      <div class="steps-editor" id="steps-editor"></div>

    </div>
  </div>

</div>

  </div>
</div>

const GRIND_DATA = {
  'Extra Fine':    { mmMin:0.10, mmMax:0.20, pct:4,  dotPx:4,  desc:'Powdery — like fine flour. Used for Turkish coffee only. Too fine for any filter method; will clog paper instantly and produce over-extracted, bitter results.' },

  'Medium-fine':   { mmMin:0.40, mmMax:0.60, pct:34, dotPx:11, desc:'Finer than table salt. The sweet spot for V60 and Aeropress. Maximises extraction rate to compensate for the V60\'s fast drawdown — produces a bright, clean, high-clarity cup.' },
  'Medium':        { mmMin:0.50, mmMax:0.75, pct:50, dotPx:15, desc:'Coarse sea salt texture. Works across most filter methods — V60, Origami, Kalita Wave. The universal reference point; most dial-in processes start here before adjusting finer or coarser.' },

  'Coarse':        { mmMin:1.00, mmMax:1.50, pct:80, dotPx:26, desc:'Large, distinct gritty pieces. Best for French Press and cold brew. Too coarse for filter methods — water passes through too quickly, resulting in under-extracted, sour, thin brews.' },

function renderGrindGauge(grindKey) {
  const g = GRIND_DATA[grindKey];
  if (!g) return '';
  return `
    <div class="grind-block">
      <div class="section-label">Grind size</div>
      <div class="grind-info-row">
        <span class="grind-name">${grindKey}</span>
        <span class="grind-mm">${g.mmMin}&ndash;${g.mmMax} mm particle diameter</span>
      </div>
      <div class="grind-scale-track">
        <div class="grind-scale-fill" style="width:${g.pct}%"></div>
        <div class="grind-needle" style="left:${g.pct}%"></div>
      </div>
      <div class="grind-tick-labels">
        <span>Extra Fine</span><span>Fine</span><span>Medium</span><span>Coarse</span><span>Extra Coarse</span>
      </div>
      <div class="particle-row">
        <div class="particle-dot" style="width:${g.dotPx}px;height:${g.dotPx}px;" title="Approximate particle size at visual scale"></div>
        <span class="particle-label">Approximate particle size &mdash; visual scale (100&times; actual)</span>
      </div>
      <p class="grind-detail">${g.desc}</p>
    </div>
  `;
}

    grind: "Medium-coarse",
    totalTime: "5:00", totalTimeSec: 300,
    notes: "Aida Batlle, renowned producer and five-time Cup of Excellence winner, uses the Chemex to showcase her naturally processed El Salvador coffees. Her method uses a high coffee-to-water ratio for clarity and density, with an unusually long bloom to ensure full degassing of freshly roasted beans. The slow, low-agitation pours preserve the delicate floral and fruit notes that naturally processed coffees are known for. Ideal for washed or natural light roasts.",
    steps: [
      { at: "0:00", atSec: 0,   desc: "Pre-wet filter — discard water, keep server warm", pour: 0, total: 0 },
      { at: "0:15", atSec: 15,  desc: "Bloom — saturate evenly, 45s rest", pour: 84, total: 84 },
      { at: "1:00", atSec: 60,  desc: "First pour — slow spiral from centre", pour: 196, total: 280 },
      { at: "2:15", atSec: 135, desc: "Second pour — steady stream, low agitation", pour: 210, total: 490 },
      { at: "3:30", atSec: 210, desc: "Final pour — gentle centre pour", pour: 210, total: 700 },
    ]
  }
];

// ── STATE ──
let selectedId = null;
let editingId = null;
let timerInterval = null;
let timerElapsed = 0;
let timerRunning = false;
let timerRecipe = null;
let stepCount = 1;

function getUserRecipes() {
  try { return JSON.parse(localStorage.getItem('pour_recipes') || '[]'); } catch { return []; }
}
function saveUserRecipes(arr) {
  localStorage.setItem('pour_recipes', JSON.stringify(arr));
}
function getAllRecipes() {
  return [...CHAMPION_RECIPES, ...getUserRecipes()];
}

// ── DRIPPER ORDER ──
const DRIPPER_ORDER = ['V60','Chemex','Kalita Wave','Origami','Clever Dripper','Aeropress','Melodrip','Other'];

// ══════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════
function renderSidebar() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const all = getAllRecipes();
  const filtered = q ? all.filter(r =>
    r.name.toLowerCase().includes(q) ||
    r.author.toLowerCase().includes(q) ||
    r.dripper.toLowerCase().includes(q)
  ) : all;

  // Group by dripper
  const groups = {};
  filtered.forEach(r => {
    if (!groups[r.dripper]) groups[r.dripper] = [];
    groups[r.dripper].push(r);
  });

  const orderedKeys = [
    ...DRIPPER_ORDER.filter(d => groups[d]),
    ...Object.keys(groups).filter(d => !DRIPPER_ORDER.includes(d))
  ];

  const el = document.getElementById('sidebar-scroll');
  el.innerHTML = orderedKeys.map(dripper => {
    const items = groups[dripper];
    return `
      <div class="dripper-group" id="dg-${dripper.replace(/\s/g,'_')}">
        <div class="dripper-heading" onclick="toggleGroup('${dripper.replace(/\s/g,'_')}')">
          <span class="dripper-heading-label">${dripper}</span>
          <span class="dripper-count">${items.length}</span>
          <span class="dripper-toggle">▾</span>
        </div>
        <div class="dripper-items">
          ${items.map(r => `
            <div class="recipe-item ${r.id === selectedId ? 'active' : ''}" onclick="selectRecipe('${r.id}')">
              <div class="ri-title">${r.name}</div>
              <div class="ri-sub">${r.author}${r.country ? ' · ' + r.country : ''}</div>
              <div class="ri-badges">
                ${r.year ? `<span class="ri-badge">${r.year}</span>` : ''}
                ${r.user ? `<span class="ri-badge user-badge">My recipe</span>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('') || '<div style="padding:20px 16px;font-family:\'IBM Plex Mono\',monospace;font-size:11px;color:var(--mid)">No recipes found.</div>';
}

function toggleGroup(key) {
  const el = document.getElementById('dg-' + key);
  if (el) el.classList.toggle('collapsed');
}

// ══════════════════════════════════
//  DETAIL
// ══════════════════════════════════
function selectRecipe(id) {
  selectedId = id;
  renderSidebar();
  const r = getAllRecipes().find(x => x.id === id);
  if (!r) return;

  const stepsHtml = r.steps.map(s => `
    <tr>
      <td class="td-at">${s.at}</td>
      <td class="td-desc">${s.desc}</td>
      <td class="td-pour">${s.pour > 0 ? '+' + s.pour + 'g' : '—'}</td>
      <td class="td-total">${s.total > 0 ? s.total + 'g' : ''}</td>
    </tr>
  `).join('');

  const userActions = r.user ? `
    <button class="btn-secondary" onclick="editRecipe('${r.id}')">Edit</button>
    <button class="btn-danger" onclick="confirmDelete('${r.id}')">Delete</button>
  ` : '';

  const grindKey = Object.keys(GRIND_DATA).find(k => r.grind && r.grind.toLowerCase() === k.toLowerCase()) || null;

  document.getElementById('detail-pane').innerHTML = `
    <div class="dp-eyebrow">${r.dripper}${r.origin ? ' · ' + r.origin : ''}${r.year ? ' · ' + r.year : ''}</div>
    <div class="dp-title">${r.name}</div>
    <div class="dp-author">${r.author}${r.country ? ', ' + r.country : ''}</div>

    <div class="stats-row">
      <div class="stat-cell">
        <div class="stat-label">Coffee</div>
        <div class="stat-value">${r.coffee}<span class="stat-unit">g</span></div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Water</div>
        <div class="stat-value">${r.water}<span class="stat-unit">g</span></div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Ratio</div>
        <div class="stat-value">1<span class="stat-unit">:${(r.water/r.coffee).toFixed(0)}</span></div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Temp</div>
        <div class="stat-value">${r.temp}<span class="stat-unit">°C</span></div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Time</div>
        <div class="stat-value" style="font-size:var(--tx-lg);padding-top:2px">${r.totalTime}</div>
      </div>
    </div>

    ${r.notes ? `<div class="section-label">Notes</div><p class="dp-notes">${r.notes}</p>` : ''}

    ${grindKey ? renderGrindGauge(grindKey) : (r.grind ? `<div class="section-label">Grind size</div><p class="dp-notes" style="margin-bottom:28px">${r.grind}</p>` : '')}

    <div class="section-label">Pour schedule</div>
    <table class="pour-table">
      <thead><tr>
        <th>At</th><th>Step</th><th>Pour</th><th>Total</th>
      </tr></thead>
      <tbody>${stepsHtml}</tbody>
    </table>

    <div class="dp-actions">
      <button class="btn-primary" onclick="brewThis('${r.id}')">Brew this</button>
      ${userActions}
    </div>
  `;
}

// ══════════════════════════════════
//  TIMER
// ══════════════════════════════════
let timerCountUp = false; // false = count down (default)

function brewThis(id) {
  const r = getAllRecipes().find(x => x.id === id);
  if (!r) return;
  timerRecipe = r;
  timerElapsed = 0;
  timerRunning = false;
  if (timerInterval) clearInterval(timerInterval);
  switchTo('timer');
  renderTimer();
}

function toggleCountMode() {
  timerCountUp = !timerCountUp;
  renderTimer();
}

function renderTimer() {
  const r = timerRecipe;
  if (!r) return;

  const C = 2 * Math.PI * 108;
  const pct = Math.min(timerElapsed / r.totalTimeSec, 1);
  // Arc fills forward for count-up, drains for count-down
  const offset = timerCountUp ? C * (1 - pct) : C * pct;

  // Display time: count up shows elapsed, count down shows remaining
  const displaySec = timerCountUp
    ? timerElapsed
    : Math.max(0, r.totalTimeSec - timerElapsed);
  const m = Math.floor(displaySec / 60);
  const s = displaySec % 60;
  const timeStr = `${m}:${String(s).padStart(2,'0')}`;

  let cur = 0;
  for (let i = 0; i < r.steps.length; i++) {
    if (timerElapsed >= r.steps[i].atSec) cur = i;
  }
  const done = timerElapsed >= r.totalTimeSec;

  const pouredSoFar = r.steps.slice(0, cur + 1).reduce((a, s) => a + s.pour, 0);
  const pourPct = r.water > 0 ? Math.min(pouredSoFar / r.water * 100, 100) : 0;

  const stepsHtml = r.steps.map((step, i) => {
    const cls = i < cur ? 'done' : i === cur ? 'current' : '';
    return `
      <div class="ts-row ${cls}">
        <span class="ts-at">${step.at}</span>
        <span class="ts-desc">${step.desc}</span>
        <span class="ts-pour">${step.pour > 0 ? '+' + step.pour + 'g' : '—'}</span>
        <div class="ts-dot"></div>
      </div>
    `;
  }).join('');

  const curStep = r.steps[cur];
  const phaseLabel = done ? 'Complete' : curStep.desc.split('—')[0].trim();
  const actionLabel = done ? '✓' : (curStep.pour > 0 ? `Pour ${curStep.pour}g` : 'Wait');
  const playLabel = timerRunning ? 'Pause' : (done ? 'Reset' : 'Start');
  const modeLabel = timerCountUp ? '↑ Count up' : '↓ Count down';

  document.getElementById('timer-content').innerHTML = `
    <div class="timer-container">
      <div class="timer-header">
        <div class="timer-recipe-title">${r.name}</div>
        <div class="timer-recipe-meta">${r.author} · ${r.dripper} · ${r.water}g water · ${r.coffee}g coffee</div>
      </div>

      <div class="clock-wrap">
        <svg class="clock-svg" width="240" height="240" viewBox="0 0 240 240">
          <circle class="clock-track" cx="120" cy="120" r="108"/>
          <circle class="clock-arc"
            cx="120" cy="120" r="108"
            stroke-dasharray="${C}"
            stroke-dashoffset="${offset}"
            transform="rotate(-90 120 120)"
            stroke="${done ? '#555' : 'var(--white)'}"/>
        </svg>
        <div class="clock-center">
          <div class="clock-time-display">${done ? '✓' : timeStr}</div>
          <div class="clock-step-label">${phaseLabel}</div>
          <div class="clock-step-action">${actionLabel}</div>
        </div>
      </div>

      <div class="timer-steps">${stepsHtml}</div>

      <div class="timer-controls">
        <button class="tctrl" onclick="resetTimer()">Reset</button>
        <button class="tctrl tctrl-play" onclick="toggleTimer()">${playLabel}</button>
        <button class="tctrl" onclick="toggleCountMode()" style="min-width:110px">${modeLabel}</button>
        <button class="tctrl" onclick="switchTo('recipes')">← Back</button>
      </div>

      <div class="water-progress">
        <div class="water-row">
          <span>Water poured</span>
          <span>${pouredSoFar}g / ${r.water}g</span>
        </div>
        <div class="water-bar">
          <div class="water-fill" style="width:${pourPct}%"></div>
        </div>
      </div>
    </div>
  `;
}

function toggleTimer() {
  if (!timerRecipe) return;
  if (timerElapsed >= timerRecipe.totalTimeSec) { resetTimer(); return; }
  timerRunning = !timerRunning;
  if (timerRunning) {
    timerInterval = setInterval(() => {
      timerElapsed++;
      if (timerElapsed >= timerRecipe.totalTimeSec) {
        timerRunning = false;
        clearInterval(timerInterval);
      }
      renderTimer();
    }, 1000);
  } else {
    clearInterval(timerInterval);
  }
  renderTimer();
}

function resetTimer() {
  timerRunning = false;
  timerElapsed = 0;
  if (timerInterval) clearInterval(timerInterval);
  renderTimer();
}

// ══════════════════════════════════
//  ADD / EDIT RECIPE
// ══════════════════════════════════
let editSteps = [];

function addStepRow(step) {
  const idx = editSteps.length;
  editSteps.push(step || { at: '', desc: '', pour: '' });
  const container = document.getElementById('steps-editor');
  const row = document.createElement('div');
  row.className = 'step-edit-row';
  row.id = 'step-row-' + idx;
  row.innerHTML = `
    <input class="form-input" placeholder="0:30" id="step-at-${idx}" value="${editSteps[idx].at}" oninput="editSteps[${idx}].at=this.value">
    <input class="form-input" placeholder="Bloom — saturate grounds" id="step-desc-${idx}" value="${editSteps[idx].desc}" oninput="editSteps[${idx}].desc=this.value">
    <input class="form-input" type="number" placeholder="50" id="step-pour-${idx}" value="${editSteps[idx].pour}" oninput="editSteps[${idx}].pour=this.value">
    <button class="btn-icon" onclick="removeStepRow(${idx})" title="Remove">×</button>
  `;
  container.appendChild(row);
}

function removeStepRow(idx) {
  editSteps.splice(idx, 1);
  rebuildStepEditor();
}

function rebuildStepEditor() {
  const container = document.getElementById('steps-editor');
  container.innerHTML = '';
  const saved = [...editSteps];
  editSteps = [];
  saved.forEach(s => addStepRow(s));
}

function saveRecipe() {
  const name = document.getElementById('f-name').value.trim();
  const author = document.getElementById('f-author').value.trim();
  const dripper = document.getElementById('f-dripper').value;
  const coffee = parseFloat(document.getElementById('f-coffee').value);
  const water = parseFloat(document.getElementById('f-water').value);
  const temp = parseFloat(document.getElementById('f-temp').value);
  const grind = document.getElementById('f-grind').value.trim();
  const totalTime = document.getElementById('f-time').value.trim();
  const notes = document.getElementById('f-notes').value.trim();
  const origin = document.getElementById('f-origin').value.trim();

  if (!name) { showToast('Recipe name is required.'); return; }
  if (!coffee || !water) { showToast('Coffee and water amounts are required.'); return; }
  if (editSteps.length === 0) { showToast('Add at least one pour step.'); return; }

  // Parse total time to seconds
  let totalTimeSec = 0;
  if (totalTime) {
    const parts = totalTime.split(':');
    if (parts.length === 2) totalTimeSec = parseInt(parts[0]) * 60 + parseInt(parts[1]);
    else totalTimeSec = parseInt(parts[0]);
  }
  // fallback: use last step's time
  if (!totalTimeSec && editSteps.length > 0) {
    const last = editSteps[editSteps.length - 1].at;
    if (last) {
      const p = last.split(':');
      totalTimeSec = p.length === 2 ? parseInt(p[0]) * 60 + parseInt(p[1]) + 60 : parseInt(p[0]) + 60;
    }
  }

  // Build steps with cumulative totals
  let running = 0;
  const steps = editSteps.map(s => {
    const pour = parseFloat(s.pour) || 0;
    running += pour;
    const at = s.at || '0:00';
    const parts = at.split(':');
    const atSec = parts.length === 2 ? parseInt(parts[0]) * 60 + parseInt(parts[1]) : parseInt(parts[0]);
    return { at, atSec, desc: s.desc || 'Pour', pour, total: running };
  });

  const userRecipes = getUserRecipes();

  if (editingId) {
    const idx = userRecipes.findIndex(r => r.id === editingId);
    if (idx > -1) {
      userRecipes[idx] = { ...userRecipes[idx], name, author, dripper, origin, coffee, water, temp, grind, totalTime: totalTime || `${Math.floor(totalTimeSec/60)}:${String(totalTimeSec%60).padStart(2,'0')}`, totalTimeSec, notes, steps };
    }
    saveUserRecipes(userRecipes);
    showToast('Recipe updated.');
    const rid = editingId;
    editingId = null;
    clearForm();
    switchTo('recipes');
    renderSidebar();
    selectRecipe(rid);
  } else {
    const newR = {
      id: 'user-' + Date.now(), user: true,
      name, author, dripper, origin,
      coffee, water, temp, grind,
      totalTime: totalTime || `${Math.floor(totalTimeSec/60)}:${String(totalTimeSec%60).padStart(2,'0')}`,
      totalTimeSec, notes, steps
    };
    userRecipes.push(newR);
    saveUserRecipes(userRecipes);
    showToast('Recipe saved.');
    clearForm();
    switchTo('recipes');
    renderSidebar();
    selectRecipe(newR.id);
  }
}

function editRecipe(id) {
  const r = getUserRecipes().find(x => x.id === id);
  if (!r) return;
  editingId = id;
  switchTo('add');
  document.getElementById('form-title').textContent = 'Edit recipe';
  document.getElementById('cancel-edit-btn').style.display = '';

  document.getElementById('f-name').value = r.name || '';
  document.getElementById('f-dripper').value = r.dripper || 'V60';
  document.getElementById('f-author').value = r.author || '';
  document.getElementById('f-origin').value = r.origin || '';
  document.getElementById('f-coffee').value = r.coffee || '';
  document.getElementById('f-water').value = r.water || '';
  document.getElementById('f-temp').value = r.temp || '';
  document.getElementById('f-grind').value = r.grind || '';
  document.getElementById('f-time').value = r.totalTime || '';
  document.getElementById('f-notes').value = r.notes || '';

  editSteps = [];
  document.getElementById('steps-editor').innerHTML = '';
  (r.steps || []).forEach(s => addStepRow({ at: s.at, desc: s.desc, pour: s.pour }));
}

function cancelEdit() {
  editingId = null;
  clearForm();
  switchTo('recipes');
}

function clearForm() {
  ['f-name','f-author','f-origin','f-coffee','f-water','f-temp','f-time','f-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('f-dripper').value = 'V60';
  document.getElementById('f-grind').value = '';
  document.getElementById('steps-editor').innerHTML = '';
  document.getElementById('form-title').textContent = 'Add your recipe';
  document.getElementById('cancel-edit-btn').style.display = 'none';
  editSteps = [];
  editingId = null;
}

// ══════════════════════════════════
//  DELETE
// ══════════════════════════════════
function confirmDelete(id) {
  const r = getAllRecipes().find(x => x.id === id);
  document.getElementById('modal-title').textContent = 'Delete "' + (r ? r.name : 'recipe') + '"?';
  document.getElementById('modal-body').textContent = 'This cannot be undone.';
  document.getElementById('modal-confirm-btn').onclick = () => deleteRecipe(id);
  document.getElementById('confirm-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('confirm-modal').classList.remove('open');
}
function deleteRecipe(id) {
  const userRecipes = getUserRecipes().filter(r => r.id !== id);
  saveUserRecipes(userRecipes);
  closeModal();
  showToast('Recipe deleted.');
  selectedId = null;
  renderSidebar();
  document.getElementById('detail-pane').innerHTML = `
    <div class="empty-state"><p>Select a recipe to see its pour schedule.</p></div>
  `;
}

// ══════════════════════════════════
//  PANEL NAV
// ══════════════════════════════════
function switchTo(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.hn-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name + '-panel').classList.add('active');
  document.querySelectorAll('.hn-btn').forEach(b => {
    if (b.textContent.toLowerCase().replace(/\s|\+/g,'').includes(name.replace('add','add'))) {
      if ((name === 'add' && b.textContent.includes('+')) ||
          (name !== 'add' && b.textContent.toLowerCase().includes(name))) {
        b.classList.add('active');
      }
    }
  });
  if (name === 'add' && !editingId) {
    // fresh form — ensure first step row exists if empty
    if (editSteps.length === 0) addStepRow();
  }
}

// ══════════════════════════════════
//  TOAST
// ══════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ══════════════════════════════════
//  INIT
// ══════════════════════════════════
renderSidebar();
// Auto-select first recipe
selectRecipe(CHAMPION_RECIPES[0].id);
</script>
